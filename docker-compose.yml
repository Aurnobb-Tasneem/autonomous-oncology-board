# =============================================================================
# AOB Local Development — docker-compose.yml
# =============================================================================
# NOTE: The ML layer (PyTorch + ROCm + vLLM + Ollama + GigaPath + Qwen-VL +
# Llama 3.3 70B) CANNOT run in Docker on a standard developer machine. It
# requires the AMD MI300X ROCm host. This compose file is for local
# development of the Next.js frontend against a remote FastAPI backend, plus
# an optional Qdrant instance for RAG development.
#
# The project went FastAPI-direct on Day 4 — there is NO NestJS gateway.
#
# Usage:
#   bash scripts/stack_up.sh       # AMD host: Qdrant + docker start rocm2|rocm + deploy FastAPI
#   docker compose up              # Start Qdrant + Next.js frontend dev server
#                                  # (FastAPI ML API runs on the AMD MI300X host, not in Compose)
#   docker compose up qdrant       # Start Qdrant only (for RAG dev)
#   docker compose --profile amd up vllm-tnm vllm-biomarker vllm-treatment
#                                  # AMD MI300X host only — start LoRA specialists
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Qdrant — local vector database (in-process for hackathon, but useful
  # to have a standalone instance for local RAG development)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aob-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Next.js Frontend (talks directly to FastAPI on the AMD MI300X host)
  # ---------------------------------------------------------------------------
  # Uses the official node:20 image directly — no Dockerfile needed. The
  # working directory is bind-mounted from ./frontend, and `npm run dev`
  # starts the Next.js dev server with hot reload.
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: aob-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # Public URL the browser uses to reach FastAPI (override per-host as needed).
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
      # Server-side URL used by Next.js rewrites in next.config.ts.
      # On the MI300X host both FastAPI and the frontend are colocated, so
      # host.docker.internal:8000 reaches the FastAPI process.
      BACKEND_INTERNAL_URL: "${BACKEND_INTERNAL_URL:-http://host.docker.internal:8000}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: sh -c "npm install --prefer-offline --no-audit --no-fund && npm run dev"

  # ---------------------------------------------------------------------------
  # vLLM — TNM Specialist (LoRA adapter on Llama-3.1-8B)
  # ---------------------------------------------------------------------------
  # NOTE: This service REQUIRES the AMD MI300X ROCm host.
  # Run with:  docker compose --profile amd up vllm-tnm
  # (excluded from default `docker compose up` to prevent failures on
  #  non-AMD developer machines).
  #
  # Adapter must be trained first:
  #   python scripts/finetune_tnm.py
  # ---------------------------------------------------------------------------
  vllm-tnm:
    image: vllm/vllm-openai:latest          # use the ROCm build on MI300X
    container_name: aob-vllm-tnm
    profiles: ["amd"]
    ports:
      - "8006:8006"
    volumes:
      - ./ml/models/checkpoints/tnm_lora:/adapter:ro
      - huggingface_cache:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN}
    command: >
      --model meta-llama/Llama-3.1-8B-Instruct
      --enable-lora
      --lora-modules tnm_specialist=/adapter
      --port 8006
      --gpu-memory-utilization 0.05
      --max-model-len 2048
      --dtype bfloat16
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    security_opt:
      - seccomp:unconfined

  # ---------------------------------------------------------------------------
  # vLLM — Biomarker Specialist (LoRA adapter on Llama-3.1-8B)
  # ---------------------------------------------------------------------------
  # AMD MI300X host only. Adapter trained via scripts/finetune_biomarker.py.
  # ---------------------------------------------------------------------------
  vllm-biomarker:
    image: vllm/vllm-openai:latest
    container_name: aob-vllm-biomarker
    profiles: ["amd"]
    ports:
      - "8007:8007"
    volumes:
      - ./ml/models/checkpoints/biomarker_lora:/adapter:ro
      - huggingface_cache:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN}
    command: >
      --model meta-llama/Llama-3.1-8B-Instruct
      --enable-lora
      --lora-modules biomarker_specialist=/adapter
      --port 8007
      --gpu-memory-utilization 0.05
      --max-model-len 2048
      --dtype bfloat16
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    security_opt:
      - seccomp:unconfined

  # ---------------------------------------------------------------------------
  # vLLM — Treatment Specialist (LoRA adapter on Llama-3.1-8B)
  # ---------------------------------------------------------------------------
  # AMD MI300X host only. Adapter trained via scripts/finetune_treatment.py.
  # ---------------------------------------------------------------------------
  vllm-treatment:
    image: vllm/vllm-openai:latest
    container_name: aob-vllm-treatment
    profiles: ["amd"]
    ports:
      - "8008:8008"
    volumes:
      - ./ml/models/checkpoints/treatment_lora:/adapter:ro
      - huggingface_cache:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN}
    command: >
      --model meta-llama/Llama-3.1-8B-Instruct
      --enable-lora
      --lora-modules treatment_specialist=/adapter
      --port 8008
      --gpu-memory-utilization 0.05
      --max-model-len 2048
      --dtype bfloat16
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    security_opt:
      - seccomp:unconfined

volumes:
  qdrant_data:
  huggingface_cache:
  frontend_node_modules:
  frontend_next_cache:
